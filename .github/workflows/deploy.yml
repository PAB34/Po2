name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "saas/backend/**"
      - "saas/frontend/**"
      - "saas/infra/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            if [ ! -d "${{ secrets.VPS_APP_PATH }}/.git" ]; then
              git clone ${{ secrets.REPO_SSH_URL }} ${{ secrets.VPS_APP_PATH }}
            fi
            cd ${{ secrets.VPS_APP_PATH }}
            git fetch --all
            git reset --hard origin/${{ github.ref_name }}
            docker compose -f saas/infra/docker-compose.prod.yml --env-file saas/.env up -d --build
