name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "saas/backend/**"
      - "saas/frontend/**"
      - "saas/infra/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            TARGET_DIR="${{ secrets.VPS_APP_PATH }}"
            REPO_URL="${{ secrets.REPO_SSH_URL }}"
            BRANCH_REF="origin/${{ github.ref_name }}"

            mkdir -p "$TARGET_DIR"

            if [ -d "$TARGET_DIR/.git" ]; then
              REPO_DIR="$TARGET_DIR"
            elif [ -d "$TARGET_DIR/repo/.git" ]; then
              REPO_DIR="$TARGET_DIR/repo"
            else
              git clone "$REPO_URL" "$TARGET_DIR/repo"
              REPO_DIR="$TARGET_DIR/repo"
            fi

            cd "$REPO_DIR"
            git fetch --all
            git reset --hard "$BRANCH_REF"

            if [ -f "$REPO_DIR/saas/infra/docker-compose.prod.yml" ]; then
              APP_DIR="$REPO_DIR/saas"
            elif [ -f "$REPO_DIR/infra/docker-compose.prod.yml" ]; then
              APP_DIR="$REPO_DIR"
            else
              echo "docker-compose.prod.yml introuvable depuis $REPO_DIR" >&2
              exit 1
            fi

            if [ -f "$APP_DIR/.env" ]; then
              ENV_FILE="$APP_DIR/.env"
            elif [ -f "$REPO_DIR/.env" ]; then
              ENV_FILE="$REPO_DIR/.env"
            else
              echo ".env introuvable dans $APP_DIR ou $REPO_DIR" >&2
              exit 1
            fi

            docker compose -f "$APP_DIR/infra/docker-compose.prod.yml" --project-directory "$APP_DIR/infra" --env-file "$ENV_FILE" up -d --build
