services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    working_dir: /workspace/saas
    volumes:
      - ..:/workspace/saas:cached
    environment:
      DATABASE_URL: postgresql+psycopg://patrimoineop:patrimoineop@db:5432/patrimoineop
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      VITE_API_URL: /api
    depends_on:
      - db

  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: patrimoineop
      POSTGRES_USER: patrimoineop
      POSTGRES_PASSWORD: patrimoineop
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
